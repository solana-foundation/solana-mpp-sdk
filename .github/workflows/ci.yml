name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: typescript

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-ts:
    name: TypeScript tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

      - name: Coverage report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: typescript
          json-summary-path: coverage/coverage-summary.json
          name: TypeScript

  test-rust:
    name: Rust tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-

      - name: Run tests with coverage
        working-directory: rust
        run: cargo llvm-cov --lcov --output-path coverage.lcov

      - name: Generate coverage summary
        if: always()
        id: rust-cov
        working-directory: rust
        run: |
          # Parse lcov to extract summary
          TOTAL_LINES=$(grep -c "^DA:" coverage.lcov || echo 0)
          HIT_LINES=$(grep "^DA:" coverage.lcov | grep -v ",0$" | wc -l | tr -d ' ')
          if [ "$TOTAL_LINES" -gt 0 ]; then
            PCT=$(echo "scale=1; $HIT_LINES * 100 / $TOTAL_LINES" | bc)
          else
            PCT="0.0"
          fi
          echo "total=$TOTAL_LINES" >> $GITHUB_OUTPUT
          echo "hit=$HIT_LINES" >> $GITHUB_OUTPUT
          echo "pct=$PCT" >> $GITHUB_OUTPUT

      - name: Comment PR with Rust coverage
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: rust-coverage
          message: |
            ### Rust Coverage

            | Metric | Value |
            |--------|-------|
            | Lines covered | ${{ steps.rust-cov.outputs.hit }} / ${{ steps.rust-cov.outputs.total }} |
            | Coverage | **${{ steps.rust-cov.outputs.pct }}%** |

      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Wait for Surfpool
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - run: pnpm test:integration
