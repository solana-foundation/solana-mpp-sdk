name: Report

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

defaults:
  run:
    working-directory: .

jobs:
  report:
    name: Coverage & Report
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download artifacts from the CI run
      - uses: actions/download-artifact@v4
        with:
          name: ts-coverage
          path: ts-cov
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: rust-cov
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: surfpool-reports-rust
          path: surfpool-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          name: surfpool-reports-ts
          path: surfpool-reports
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Generate merged Surfpool report
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Generate merged report
        run: |
          COUNT=$(ls surfpool-reports/*.json 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "Generating report from $COUNT surfpool instances..."
            mkdir -p rust/target
            ln -sfn "$PWD/surfpool-reports" rust/target/surfpool-reports
            cd rust && cargo test --test charge_integration generate_report -- --nocapture 2>&1 || true
            [ -f target/surfpool-report.html ] && cp target/surfpool-report.html ../surfpool-report.html
          fi

      # Fetch the reusable action
      - uses: actions/checkout@v5
        with:
          repository: solana-foundation/surfpool
          ref: feat/sdk
          sparse-checkout: .github/actions
          path: _surfpool

      # Resolve PR number from the workflow run
      - name: Get PR number
        id: pr
        run: |
          PR=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts 2>/dev/null | jq -r '.artifacts[0].workflow_run.pull_requests[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR" ]; then
            PR=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" --jq '.pull_requests[0].number' 2>/dev/null || true)
          fi
          echo "number=$PR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post unified comment
      - name: Post test report
        if: steps.pr.outputs.number != ''
        uses: ./_surfpool/.github/actions/test-report
        with:
          ts-coverage-json: ts-cov/coverage-summary.json
          rust-coverage-json: rust-cov/coverage.json
          report-path: surfpool-report.html
          pages-path: pr/${{ steps.pr.outputs.number }}
