name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

defaults:
  run:
    working-directory: typescript

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-ts:
    name: TypeScript tests
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets

      # TEMPORARY: Build surfpool-sdk-node native module for integration tests.
      # This will be replaced with a published npm package once surfpool-sdk is released.
      - name: Install Rust (for surfpool-sdk-node)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache surfpool-sdk-node build
        id: cache-surfpool
        uses: actions/cache@v4
        with:
          path: /tmp/surfpool
          key: surfpool-sdk-node-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Clone and build surfpool-sdk-node
        if: steps.cache-surfpool.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch feat/sdk https://github.com/solana-foundation/surfpool.git /tmp/surfpool
          cd /tmp/surfpool/crates/sdk-node
          npm install
          npx napi build --platform surfpool-sdk --dts internal.d.ts --js internal.js
        working-directory: .

      - run: pnpm install --frozen-lockfile

      # TEMPORARY: Link the locally-built surfpool-sdk-node into node_modules
      - name: Link surfpool-sdk
        run: |
          mkdir -p node_modules
          ln -sfn /tmp/surfpool/crates/sdk-node node_modules/surfpool-sdk

      # Run ALL tests (unit + surfpool integration) with coverage
      - name: Run tests with coverage
        run: pnpm vitest run --coverage --config vitest.config.ci.ts
        env:
          SURFPOOL_REPORT: "1"

      - name: Upload TS coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: typescript/coverage/coverage-summary.json

      - name: Upload TS surfpool report data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfpool-reports-ts
          path: typescript/target/surfpool-reports/
          if-no-files-found: ignore

  build-html:
    name: Build HTML payment link assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install and build
        working-directory: html
        run: |
          npm install
          npm run build
      - name: Upload HTML build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-assets
          path: |
            html/dist/
            rust/src/server/html/
            go/server/html/
            lua/mpp/server/html_assets/
            typescript/packages/mpp/src/server/html-assets.gen.ts

  test-rust:
    name: Rust tests
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets

      - name: Run tests with coverage
        working-directory: rust
        env:
          SURFPOOL_REPORT: "1"
        run: cargo llvm-cov --json --output-path coverage.json

      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check

      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust/coverage.json

      - name: Upload Rust surfpool report data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfpool-reports-rust
          path: rust/target/surfpool-reports/
          if-no-files-found: ignore

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Wait for Surfpool
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - run: pnpm test:integration

  test-payment-links-demo:
    name: "Payment links E2E: Demo (TypeScript)"
    needs: build-html
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets
      - name: Install TypeScript dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile
      - name: Build TypeScript SDK
        working-directory: typescript
        run: pnpm build
      - name: Install demo server dependencies
        working-directory: demo/server
        run: pnpm install --frozen-lockfile
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Wait for Surfpool
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - name: Start demo server
        working-directory: demo/server
        run: npx tsx index.ts &
        env:
          NETWORK: localnet
      - name: Wait for demo server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/v1/health && break
            sleep 1
          done
      - name: Run Playwright tests (Demo)
        working-directory: html
        run: npm run test:e2e:demo

  test-payment-links-rust:
    name: "Payment links E2E: Rust"
    needs: build-html
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Build Rust test server
        working-directory: rust
        run: cargo build --example payment_link_server
      - name: Wait for Surfpool
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - name: Start Rust test server
        working-directory: rust
        run: cargo run --example payment_link_server &
      - name: Wait for Rust server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done
      - name: Run Playwright tests (Rust)
        working-directory: html
        run: npm run test:e2e:rust

  test-payment-links-go:
    name: "Payment links E2E: Go"
    needs: build-html
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Wait for Surfpool
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - name: Start Go test server
        working-directory: go
        run: go run ./cmd/payment-link-server &
        env:
          GOCACHE: /tmp/go-build-cache
      - name: Wait for Go server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3002/health && break
            sleep 1
          done
      - name: Run Playwright tests (Go)
        working-directory: html
        run: npm run test:e2e:go

  test-payment-links-lua:
    name: "Payment links E2E: Lua"
    needs: build-html
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download HTML assets
        uses: actions/download-artifact@v4
        with:
          name: html-assets
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Wait for Surfpool
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - name: Start Lua test server
        run: node lua/tests/e2e-server.mjs &
      - name: Wait for Lua server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3003/health && break
            sleep 1
          done
      - name: Run Playwright tests (Lua)
        working-directory: html
        run: npm run test:e2e:lua
