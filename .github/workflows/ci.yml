name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: typescript

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-ts:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      # TEMPORARY: Build surfpool-sdk-node native module for integration tests.
      # This will be replaced with a published npm package once surfpool-sdk is released.
      - name: Install Rust (for surfpool-sdk-node)
        uses: dtolnay/rust-toolchain@stable
      - name: Clone and build surfpool-sdk-node
        run: |
          git clone --depth 1 --branch feat/sdk https://github.com/solana-foundation/surfpool.git /tmp/surfpool
          cd /tmp/surfpool/crates/sdk-node
          npm install
          npx napi build --platform surfpool-sdk --dts internal.d.ts --js internal.js
        working-directory: .

      - run: pnpm install --frozen-lockfile

      # TEMPORARY: Link the locally-built surfpool-sdk-node into node_modules
      - name: Link surfpool-sdk
        run: |
          mkdir -p node_modules
          ln -sfn /tmp/surfpool/crates/sdk-node node_modules/surfpool-sdk

      # Run unit tests with coverage
      - run: pnpm test:coverage

      # Run surfpool integration tests (merged into same coverage)
      - name: Surfpool integration tests
        run: pnpm test:surfpool
        continue-on-error: true

      - name: Upload TS coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: typescript/coverage/coverage-summary.json

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Run tests with coverage
        working-directory: rust
        run: cargo llvm-cov --json --output-path coverage.json
      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check
      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: rust/coverage.json

  coverage-report:
    name: Coverage report
    if: always() && github.event_name == 'pull_request'
    needs: [test-ts, test-rust]
    runs-on: ubuntu-latest
    steps:
      - name: Download TS coverage
        uses: actions/download-artifact@v4
        with:
          name: ts-coverage
          path: ts-cov
        continue-on-error: true

      - name: Download Rust coverage
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: rust-cov
        continue-on-error: true

      - name: Build coverage comment
        id: cov
        run: |
          # ── TypeScript ──
          TS_STMTS="-" TS_BRANCH="-" TS_FUNC="-" TS_LINES="-"
          if [ -f ts-cov/coverage-summary.json ]; then
            TS_STMTS=$(jq -r '.total.statements.pct' ts-cov/coverage-summary.json)
            TS_BRANCH=$(jq -r '.total.branches.pct' ts-cov/coverage-summary.json)
            TS_FUNC=$(jq -r '.total.functions.pct' ts-cov/coverage-summary.json)
            TS_LINES=$(jq -r '.total.lines.pct' ts-cov/coverage-summary.json)
          fi

          # ── Rust ──
          RS_LINES="-" RS_FUNC="-" RS_REGIONS="-"
          if [ -f rust-cov/coverage.json ]; then
            RS_LINES=$(jq -r '[.data[0].totals.lines.percent] | .[0] | . * 10 | round / 10' rust-cov/coverage.json)
            RS_FUNC=$(jq -r '[.data[0].totals.functions.percent] | .[0] | . * 10 | round / 10' rust-cov/coverage.json)
            RS_REGIONS=$(jq -r '[.data[0].totals.regions.percent] | .[0] | . * 10 | round / 10' rust-cov/coverage.json)
          fi

          # ── Badge colors ──
          badge() { if [ "$(echo "$1 >= 90" | bc -l)" = "1" ]; then echo "🟢"; elif [ "$(echo "$1 >= 80" | bc -l)" = "1" ]; then echo "🟡"; else echo "🔴"; fi; }

          TS_BADGE=$(badge "$TS_LINES" 2>/dev/null || echo "⚪")
          RS_BADGE=$(badge "$RS_LINES" 2>/dev/null || echo "⚪")

          # ── Build comment ──
          {
            echo "body<<EOFCOMMENT"
            echo "## Test Coverage"
            echo ""
            echo "| | Statements | Branches | Functions | Lines |"
            echo "|---|---|---|---|---|"
            echo "| ${TS_BADGE} **TypeScript** | ${TS_STMTS}% | ${TS_BRANCH}% | ${TS_FUNC}% | ${TS_LINES}% |"
            echo "| ${RS_BADGE} **Rust** | ${RS_REGIONS}% | — | ${RS_FUNC}% | ${RS_LINES}% |"
            echo "EOFCOMMENT"
          } >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          message: ${{ steps.cov.outputs.body }}

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Wait for Surfpool
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - run: pnpm test:integration
